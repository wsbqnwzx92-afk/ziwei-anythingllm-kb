          print(f'   йЌ›и—‰о†‚: {chart[\"basic_info\"][\"ming_gong\"]}')
          print(f'   жµњж—‡о”‘зЃћв‚¬: {chart[\"basic_info\"][\"wu_xing_ju_desc\"]}')
