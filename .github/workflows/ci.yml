name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check --output-format=github .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Smoke test
        run: |
          python -c "
          from ziwei_engine import ZiweiEngine
          engine = ZiweiEngine(birth='1990-01-01', hour='zi', gender='male')
          chart = engine.calculate()
          print('Engine OK:', chart['basic_info']['ming_gong'])
          "

      - name: Formatter test
        run: |
          python -c "
          from ziwei_engine import ZiweiEngine
          from output_formatter import MarkdownFormatter, JSONFormatter
          engine = ZiweiEngine(birth='1990-06-15', hour='wu', gender='female')
          chart = engine.calculate()
          md = MarkdownFormatter(chart).format()
          js = JSONFormatter(chart).format()
          print('MD output:', len(md), 'chars')
          print('JSON output:', len(js), 'chars')
          "
