name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check --output-format=github .

      - name: Check format
        run: ruff format --check --diff .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run import smoke test
        run: |
          python -c "
          from ziwei_engine import ZiweiEngine
          engine = ZiweiEngine(birth='1990-01-01', hour='子', gender='男')
          chart = engine.calculate()
          print('✅ 排盘引擎导入并运行成功')
          print(f'   命宫: {chart[\"basic_info\"][\"ming_gong\"]}')
          print(f'   五行局: {chart[\"basic_info\"][\"wu_xing_ju_desc\"]}')
          "

      - name: Run output formatter test
        run: |
          python -c "
          from ziwei_engine import ZiweiEngine
          from output_formatter import MarkdownFormatter, JSONFormatter
          engine = ZiweiEngine(birth='1990-06-15', hour='午', gender='女')
          chart = engine.calculate()
          md = MarkdownFormatter(chart).format()
          js = JSONFormatter(chart).format()
          print('✅  Markdown 输出成功')
          print('✅  JSON 输出成功')
          print(f'   MD 长度: {len(md)} 字符')
          print(f'   JSON 长度: {len(js)} 字符')
          "
